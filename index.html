<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Privatekonomi Terminal</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#07090b;font-family:'Courier New',monospace;}
  body{color:#e6edf3;}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#1b242d;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  input,select,button,textarea{font-family:inherit}
  input::placeholder,textarea::placeholder{color:#465058}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#2dd4ff !important;box-shadow:0 0 0 3px rgba(45,212,255,.13)}
  select option{background:#0b0f13;color:#e6edf3}
  input[type="date"]{color-scheme:dark;}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;opacity:0;position:absolute;right:0;width:36px;height:100%;}
  @keyframes nwpulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
</style>
</head>
<body>
<div id="root">Laddar...</div>
<script>

function emptyData(){
  return {
    transactions: [],
    assets: [],
    debts: [],
    budgets: {},
    fire: { currentAge:'27', expectedReturn:'7', inflation:'2', swr:'4', monthlySaving:null, currentCapital:null, targetAnnualSpend:null },
  };
}
let DATA = null;
let TAB = 'oversikt';
let MONTH = (function(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); })();
let TXFILTER = 'all';
let FORM = { type:'expense', amount:'', category:'Bostad', date:MONTH+'-01', note:'' };
let ASSETFORM = { name:'', value:'', category:'Aktier/fonder' };
let DEBTFORM = { name:'', value:'' };
let IO_OPEN=false, IO_MODE='export', IMPORT_TEXT='', MSG=null;

const DEFAULT_CATS = { expense:['Bostad','Mat','Transport','Nöje','Kläder','Övrigt'], income:['Lön','Övrigt'], investment:['Övrigt','Aktier','Fonder','Amortering'] };

const FIREBASE_URL = 'https://privatekonomi-6ca77-default-rtdb.europe-west1.firebasedatabase.app';
const DB_PATH = '/privatekonomi.json';
let SAVE_TIMER = null;

async function loadData(){
  try{
    const res = await fetch(FIREBASE_URL + DB_PATH);
    if (res.ok){
      const d = await res.json();
      if (d) return d;
    }
  }catch(e){}
  // fallback to localStorage if offline
  try{
    const raw = localStorage.getItem('privatekonomi-data-v1');
    if (raw) return JSON.parse(raw);
  }catch(e){}
  return emptyData();
}

async function saveData(){
  // save to localStorage immediately as backup
  try{ localStorage.setItem('privatekonomi-data-v1', JSON.stringify(DATA)); }catch(e){}
  // debounce Firebase writes (max 1 per second)
  clearTimeout(SAVE_TIMER);
  SAVE_TIMER = setTimeout(async ()=>{
    try{
      await fetch(FIREBASE_URL + DB_PATH, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(DATA)
      });
    }catch(e){ console.warn('Firebase sync failed, data saved locally', e); }
  }, 800);
}

const fmt = v => new Intl.NumberFormat('sv-SE',{maximumFractionDigits:0}).format(Math.round(v||0)) + ' kr';
const toNum = (x,d=0) => { const n=Number(String(x==null?'':x).replace(/\s/g,'').replace(',','.')); return isFinite(n)?n:d; };
function monthLabel(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m-1,1).toLocaleDateString('sv-SE',{month:'long',year:'numeric'}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function derive(month){
  const monthTx = DATA.transactions.filter(t=>t.date && t.date.slice(0,7)===month);
  const S = (arr,p) => arr.filter(p).reduce((a,t)=>a+(Number(t.amount)||0),0);
  const income = S(monthTx,t=>t.type==='income');
  const expense = S(monthTx,t=>t.type==='expense');
  const invested = S(monthTx,t=>t.type==='investment');
  const saved = income-expense;
  const savingsRate = income>0 ? (saved/income*100) : 0;
  const totAssets = DATA.assets.reduce((a,x)=>a+toNum(x.value,0),0);
  const totDebts = DATA.debts.reduce((a,x)=>a+toNum(x.value,0),0);
  const netWorth = totAssets-totDebts;
  const expByCat = {};
  monthTx.filter(t=>t.type==='expense').forEach(t=>{ expByCat[t.category]=(expByCat[t.category]||0)+(Number(t.amount)||0); });
  const year=(month||'').slice(0,4);
  const yearTx = DATA.transactions.filter(t=>t.date && t.date.slice(0,4)===year);
  const yExpByCat = {};
  yearTx.filter(t=>t.type==='expense').forEach(t=>{ yExpByCat[t.category]=(yExpByCat[t.category]||0)+(Number(t.amount)||0); });
  const allExpByCat = {};
  DATA.transactions.filter(t=>t.type==='expense').forEach(t=>{ allExpByCat[t.category]=(allExpByCat[t.category]||0)+(Number(t.amount)||0); });
  const yIncome=S(yearTx,t=>t.type==='income'), yExpense=S(yearTx,t=>t.type==='expense'), yInvested=S(yearTx,t=>t.type==='investment');
  const ySaved=yIncome-yExpense; const yRate = yIncome>0?(ySaved/yIncome*100):0;
  const allIncome=S(DATA.transactions,t=>t.type==='income'), allExpense=S(DATA.transactions,t=>t.type==='expense'), allInvested=S(DATA.transactions,t=>t.type==='investment');
  const allSaved=allIncome-allExpense; const allRate=allIncome>0?(allSaved/allIncome*100):0;
  const allDates = DATA.transactions.map(t=>t.date).filter(Boolean).sort();
  const firstDate = allDates.length ? allDates[0] : null;
  return { income,expense,invested,saved,savingsRate,totAssets,totDebts,netWorth,expByCat,
    year,yIncome,yExpense,yInvested,ySaved,yRate,yearTxCount:yearTx.length,yExpByCat,
    allIncome,allExpense,allInvested,allSaved,allRate,allTxCount:DATA.transactions.length, monthTxCount:monthTx.length, allExpByCat, firstDate };
}

function render(){
  const root = document.getElementById('root');
  const D = derive(MONTH);
  root.innerHTML = `
  <div style="min-height:100vh;color:#e6edf3;background:radial-gradient(1100px 560px at 80% -10%, rgba(45,212,255,.08), transparent 60%), radial-gradient(900px 480px at -8% 104%, rgba(0,229,160,.07), transparent 55%), #07090b;">
    <div style="max-width:1180px;margin:0 auto;padding:20px;">
      <header style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(0,229,160,.2), rgba(45,212,255,.12));border:1px solid rgba(0,229,160,.38);box-shadow:0 0 24px rgba(0,229,160,.28);font-size:23.6px;color:#00e5a0;">◆</div>
          <div>
            <div style="font-weight:700;letter-spacing:.14em;font-size:17.7px;color:#eef4f1;">PRIVATEKONOMI</div>
            <div style="display:flex;align-items:center;gap:7px;font-size:11.8px;letter-spacing:.2em;color:#5d6b76;margin-top:2px;">
              <span style="width:7px;height:7px;border-radius:50%;background:#00e5a0;box-shadow:0 0 9px #00e5a0;animation:nwpulse 2.2s infinite;display:inline-block;"></span>
              TERMINAL · LIVE
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
          <div style="text-align:right;">
            <div style="font-size:13px;letter-spacing:.18em;color:#5d6b76;">NETTOFÖRMÖGENHET</div>
            <div style="margin-top:3px;font-weight:700;font-size:26px;color:${D.netWorth>=0?'#00e5a0':'#ff5e7a'}">${fmt(D.netWorth)}</div>
          </div>
          <button id="btn-openio" style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.025);color:#aeb9c2;border:1px solid #222a32;border-radius:11px;padding:10px 15px;font-size:14.2px;cursor:pointer;">⇅ DATA</button>
        </div>
      </header>
      <nav style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
        ${tabBtn('oversikt','ÖVERSIKT')}${tabBtn('transaktioner','TRANSAKTIONER')}${tabBtn('formogenhet','FÖRMÖGENHET')}
      </nav>
      <div id="content"></div>
    </div>
  </div>
  ${IO_OPEN ? renderModal() : ''}
  `;
  document.getElementById('content').innerHTML = TAB==='oversikt' ? renderOversikt(D) : TAB==='transaktioner' ? renderTx(D) : renderFormogenhet(D);
  bindEvents();
}

function tabBtn(key,label){
  const active = TAB===key;
  return `<button data-tab="${key}" style="display:flex;align-items:center;gap:8px;padding:10px 17px;border-radius:11px;cursor:pointer;font-size:14.8px;font-weight:600;letter-spacing:.05em;
    border:1px solid ${active?'rgba(0,229,160,.5)':'#1b2228'};
    background:${active?'linear-gradient(180deg, rgba(0,229,160,.15), rgba(0,229,160,.04))':'rgba(255,255,255,.012)'};
    color:${active?'#00e5a0':'#7c8893'};">${label}</button>`;
}
function card(content,style=''){ return `<div style="background:linear-gradient(180deg,#0f1418,#0b0e11);border:1px solid #1a2128;border-radius:16px;padding:20px;${style}">${content}</div>`; }
function row(label,val,col){
  return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #141a20;"><span style="font-size:16.5px;color:#8b97a3;">${label}</span><span style="font-size:15.3px;color:${col};">${val}</span></div>`;
}
function catBreakdown(expByCat){
  const total = Object.values(expByCat).reduce((a,v)=>a+v,0) || 1;
  const entries = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) return `<div style="padding:10px 0;text-align:center;font-size:13px;color:#465058;">Inga utgifter</div>`;
  const rankCols=['#00e5a0','#2dd4ff','#ffb454','#ff5e7a','#a78bfa'];
  return entries.map(([cat,amt],i)=>{
    const col=rankCols[i%rankCols.length]; const pct=amt/total*100;
    return `<div style="margin-top:10px;">
      <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:5px;">
        <span style="font-size:14.8px;color:#d4ddd9;">${esc(cat)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:14.2px;color:#cdd8d4;">${fmt(amt)}</span>
          <span style="font-size:15.3px;font-weight:600;color:#aeb9c2;width:38px;text-align:right;">${Math.round(pct)}%</span>
        </span>
      </div>
      <div style="height:5px;border-radius:5px;background:#10161b;overflow:hidden;">
        <div style="width:${Math.max(3,pct)}%;height:100%;background:${col};box-shadow:0 0 8px ${col};"></div>
      </div>
    </div>`;
  }).join('');
}

function renderOversikt(D){
  const budgetCats = Array.from(new Set([...Object.keys(DATA.budgets||{}), ...Object.keys(D.expByCat)]));
  const budgetRows = budgetCats.length ? budgetCats.map(c=>{
    const spent = D.expByCat[c]||0; const limit = (DATA.budgets&&DATA.budgets[c])||0;
    const pct = limit>0 ? Math.min(100, spent/limit*100) : (spent>0?100:0);
    const over = limit>0 && spent>limit;
    const col = over?'#ff5e7a':(limit>0?'#00e5a0':'#39424b');
    return `<div style="margin-bottom:13px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;">
        <span style="font-size:15.3px;color:#d4ddd9;">${esc(c)}</span>
        <span style="display:flex;align-items:center;gap:6px;font-size:14.2px;color:#aeb9c2;">
          ${fmt(spent)} / <input data-budget="${esc(c)}" value="${limit||''}" placeholder="tak" inputmode="numeric" style="width:70px;background:#0a0d10;border:1px solid #20272f;border-radius:8px;padding:4px 7px;color:#dbe6ec;font-size:13.6px;text-align:right;">
        </span>
      </div>
      <div style="height:7px;border-radius:6px;background:#10161b;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${col};box-shadow:0 0 10px ${col};border-radius:6px;"></div>
      </div>
    </div>`;
  }).join('') : `<div style="padding:20px 0;text-align:center;font-size:14.2px;color:#465058;">Lägg till transaktioner för att se budget</div>`;

  const totalExp = D.expense||1;
  const rankCols=['#00e5a0','#2dd4ff','#ffb454','#ff5e7a','#a78bfa'];
  const top = Object.entries(D.expByCat).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([cat,amt],i)=>{
    const col=rankCols[i%rankCols.length]; const pct=amt/totalExp*100;
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:11px;">
      <span style="font-size:15.3px;font-weight:700;color:${col};width:20px;">${String(i+1).padStart(2,'0')}</span>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:5px;">
          <span style="font-size:15.3px;color:#d4ddd9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cat)}</span>
          <span style="font-size:14.2px;color:#cdd8d4;">${fmt(amt)}</span>
        </div>
        <div style="height:6px;border-radius:5px;background:#10161b;overflow:hidden;">
          <div style="width:${Math.max(3,pct)}%;height:100%;background:${col};box-shadow:0 0 8px ${col};"></div>
        </div>
      </div>
      <span style="font-size:17.7px;font-weight:600;color:#aeb9c2;width:46px;text-align:right;">${Math.round(pct)}%</span>
    </div>`;
  }).join('') || `<div style="padding:20px 0;text-align:center;font-size:14.2px;color:#465058;">Inga utgifter denna månad</div>`;

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <button data-month="-1" style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid #222a32;color:#aeb9c2;font-size:20.1px;cursor:pointer;">‹</button>
      <div style="font-size:16.5px;letter-spacing:.06em;color:#dbe6ec;min-width:160px;text-align:center;text-transform:uppercase;font-weight:600;">${monthLabel(MONTH)}</div>
      <button data-month="1" style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid #222a32;color:#aeb9c2;font-size:20.1px;cursor:pointer;">›</button>
    </div>
    <div style="font-size:13px;color:#5d6b76;">${D.monthTxCount} poster denna månad</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px;">
    ${card(`<div style="font-size:13px;letter-spacing:.16em;color:#5d6b76;">INKOMSTER</div><div style="margin-top:9px;font-weight:700;font-size:26px;color:#00e5a0;">${fmt(D.income)}</div>`)}
    ${card(`<div style="font-size:13px;letter-spacing:.16em;color:#5d6b76;">UTGIFTER</div><div style="margin-top:9px;font-weight:700;font-size:26px;color:#ff5e7a;">${fmt(D.expense)}</div>`)}
    ${card(`<div style="font-size:13px;letter-spacing:.16em;color:#5d6b76;">INVESTERAT</div><div style="margin-top:9px;font-weight:700;font-size:26px;color:#2dd4ff;">${fmt(D.invested)}</div>`)}
    ${card(`<div style="font-size:13px;letter-spacing:.16em;color:#5d6b76;">SPARKVOT</div><div style="margin-top:9px;font-weight:700;font-size:26px;color:${D.savingsRate>=0?'#00e5a0':'#ff5e7a'};">${Math.round(D.savingsRate)}%</div><div style="font-size:11.8px;color:#5d6b76;margin-top:3px;">${fmt(D.saved)} sparat</div>`)}
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:14px;">
    ${card(`<div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:14px;">MÅNADSBUDGET</div>${budgetRows}`)}
    ${card(`<div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:14px;">UTGIFTER KATEGORI</div>${top}`)}
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;">
    ${card(`<div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:12px;">HELÅR ${D.year}</div>
      ${row('Inkomster',fmt(D.yIncome),'#00e5a0')}${row('Utgifter',fmt(D.yExpense),'#ff5e7a')}${row('Investerat',fmt(D.yInvested),'#2dd4ff')}
      <div style="display:flex;justify-content:space-between;padding:10px 0 2px;"><span style="font-size:16.5px;color:#d4ddd9;font-weight:600;">Sparat</span><span style="font-size:16.5px;color:#eef4f1;font-weight:700;">${fmt(D.ySaved)} · ${Math.round(D.yRate)}%</span></div>
      <div style="height:1px;background:#1a2128;margin:14px 0 4px;"></div>
      <div style="font-size:11.8px;letter-spacing:.1em;color:#5d6b76;">UTGIFTER PER KATEGORI</div>
      ${catBreakdown(D.yExpByCat)}`)}
    ${card(`<div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:12px;">SEDAN START${D.firstDate ? ` <span style="color:#5d6b76;font-weight:500;letter-spacing:.04em;">· ${esc(D.firstDate)}</span>` : ''}</div>
      ${row('Inkomster',fmt(D.allIncome),'#00e5a0')}${row('Utgifter',fmt(D.allExpense),'#ff5e7a')}${row('Investerat',fmt(D.allInvested),'#2dd4ff')}
      <div style="display:flex;justify-content:space-between;padding:10px 0 2px;"><span style="font-size:16.5px;color:#d4ddd9;font-weight:600;">Sparat</span><span style="font-size:16.5px;color:#eef4f1;font-weight:700;">${fmt(D.allSaved)} · ${Math.round(D.allRate)}%</span></div>
      <div style="height:1px;background:#1a2128;margin:14px 0 4px;"></div>
      <div style="font-size:11.8px;letter-spacing:.1em;color:#5d6b76;">UTGIFTER PER KATEGORI</div>
      ${catBreakdown(D.allExpByCat)}`)}
  </div>`;
}

function renderTx(D){
  let rows = DATA.transactions.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if (TXFILTER!=='all') rows = rows.filter(t=>t.type===TXFILTER);
  const tcol={income:'#00e5a0',expense:'#ff5e7a',investment:'#2dd4ff'};
  const tlbl={income:'IN',expense:'UT',investment:'INV'};
  const tsign={income:'+',expense:'−',investment:'→ '};
  const txRows = rows.map(t=>`
    <div style="display:flex;align-items:center;gap:12px;padding:10px 6px;border-bottom:1px solid #141a20;">
      <span style="font-size:11.2px;font-weight:700;padding:4px 7px;border-radius:6px;color:${tcol[t.type]};background:${tcol[t.type]}14;border:1px solid ${tcol[t.type]}33;min-width:34px;text-align:center;">${tlbl[t.type]}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:15.9px;color:#d4ddd9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.category)}</div>
        <div style="font-size:12.4px;color:#5d6b76;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.date)}${t.note?' · '+esc(t.note):''}</div>
      </div>
      <span style="font-size:15.3px;font-weight:600;color:${tcol[t.type]};white-space:nowrap;">${tsign[t.type]}${fmt(t.amount)}</span>
      <button data-deltx="${t.id}" style="background:none;border:none;color:#3a444c;cursor:pointer;font-size:18.9px;">×</button>
    </div>`).join('') || `<div style="padding:30px 0;text-align:center;font-size:14.2px;color:#465058;">Inga poster ännu — lägg till din första transaktion</div>`;

  const filters=[['all','ALLA'],['income','IN'],['expense','UT'],['investment','INV']].map(([k,l])=>{
    const a=TXFILTER===k;
    return `<button data-txf="${k}" style="padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid ${a?'rgba(45,212,255,.45)':'#1b2228'};color:${a?'#2dd4ff':'#7c8893'};background:${a?'rgba(45,212,255,.1)':'rgba(255,255,255,.012)'};">${l}</button>`;
  }).join('');

  const typeBtns = ['expense','income','investment'].map(k=>{
    const meta={expense:['UTGIFT','#ff5e7a'],income:['INKOMST','#00e5a0'],investment:['INVEST.','#2dd4ff']};
    const active=FORM.type===k; const [lbl,col]=meta[k];
    return `<button data-type="${k}" style="flex:1;padding:9px 4px;border-radius:10px;cursor:pointer;font-size:11.8px;font-weight:700;border:1px solid ${active?col:'#20272f'};color:${active?col:'#7c8893'};background:${active?col+'1a':'rgba(255,255,255,.012)'};">${lbl}</button>`;
  }).join('');

  const catOpts = (DEFAULT_CATS[FORM.type]||['Övrigt']).map(c=>`<option value="${esc(c)}" ${c===FORM.category?'selected':''}>${esc(c)}</option>`).join('');

  return `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;align-items:start;">
    ${card(`
      <div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:16px;">NY POST</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;">${typeBtns}</div>
      <div style="font-size:11.2px;letter-spacing:.14em;color:#5d6b76;margin-bottom:6px;">BELOPP</div>
      <input id="f-amount" value="${esc(FORM.amount)}" placeholder="0" inputmode="decimal" style="width:100%;background:#0a0d10;border:1px solid #20272f;border-radius:11px;padding:12px 14px;color:#eef4f1;font-size:20.1px;font-weight:600;margin-bottom:14px;">
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="flex:1;min-width:120px;">
          <div style="font-size:11.2px;letter-spacing:.14em;color:#5d6b76;margin-bottom:6px;">KATEGORI</div>
          <select id="f-category" style="width:100%;background:#0a0d10;border:1px solid #20272f;border-radius:11px;padding:11px;color:#dbe6ec;font-size:15.3px;">${catOpts}</select>
        </div>
        <div style="flex:1;min-width:120px;">
          <div style="font-size:11.2px;letter-spacing:.14em;color:#5d6b76;margin-bottom:6px;">DATUM</div>
          <div style="position:relative;">
            <input id="f-date" type="date" value="${esc(FORM.date)}" style="width:100%;background:#0a0d10;border:1px solid #20272f;border-radius:11px;padding:10px 36px 10px 10px;color:#dbe6ec;font-size:15.3px;">
            <svg viewBox="0 0 24 24" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none;" fill="none" stroke="#e6edf3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="16" rx="2"></rect>
              <line x1="16" y1="3" x2="16" y2="7"></line>
              <line x1="8" y1="3" x2="8" y2="7"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
        </div>
      </div>
      <div style="font-size:11.2px;letter-spacing:.14em;color:#5d6b76;margin-bottom:6px;">ANTECKNING</div>
      <input id="f-note" value="${esc(FORM.note)}" placeholder="valfritt..." style="width:100%;background:#0a0d10;border:1px solid #20272f;border-radius:11px;padding:11px 14px;color:#dbe6ec;font-size:16.5px;margin-bottom:16px;">
      <button id="btn-add" style="width:100%;background:linear-gradient(180deg,#00e5a0,#04b384);color:#04130d;border:none;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;font-size:15.3px;">+ LÄGG TILL POST</button>

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;">${filters}</div>
      <div style="display:flex;flex-direction:column;max-height:540px;overflow-y:auto;">${txRows}</div>

const ASSET_CATS = ['Aktier/fonder','Sparande','Fastigheter','Fordon','Extra'];

function renderFormogenhet(D){
  const nwTotal=(D.totAssets+D.totDebts)||1;
  const catOptsFor = (cur) => ASSET_CATS.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`).join('');
  const grouped = {};
  DATA.assets.forEach(a=>{ const c=a.category||ASSET_CATS[0]; (grouped[c]=grouped[c]||[]).push(a); });
  const assetRows = DATA.assets.length ? ASSET_CATS.filter(c=>grouped[c]&&grouped[c].length).map(c=>{
    const items = grouped[c].slice().sort((x,y)=>(x.name||'').localeCompare(y.name||'','sv'));
    const rows = items.map(a=>`
      <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #141a20;">
        <input data-asset-name="${a.id}" value="${esc(a.name)}" style="flex:1;min-width:0;background:#0a0d10;border:1px solid #181f26;border-radius:8px;padding:8px 10px;color:#d4ddd9;font-size:15.9px;">
        <input data-asset-value="${a.id}" value="${esc(toNum(a.value,0))}" inputmode="numeric" style="width:142px;flex-shrink:0;background:#0a0d10;border:1px solid #181f26;border-radius:8px;padding:8px 10px;color:#00e5a0;font-size:15.3px;text-align:right;">
        <button data-delasset="${a.id}" style="background:none;border:none;color:#3a444c;cursor:pointer;font-size:18.9px;flex-shrink:0;">×</button>
      </div>`).join('');
    return `<div style="margin-top:14px;">
      <div style="font-size:11px;letter-spacing:.12em;color:#5d6b76;margin-bottom:4px;text-transform:uppercase;">${esc(c)}</div>
      ${rows}
    </div>`;
  }).join('') : `<div style="padding:18px 0;text-align:center;font-size:13.6px;color:#465058;">Lägg till en tillgång ovan</div>`;
  const debtRows = DATA.debts.map(a=>`
    <div style="display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid #141a20;">
      <input data-debt-name="${a.id}" value="${esc(a.name)}" style="flex:1;min-width:0;background:#0a0d10;border:1px solid #181f26;border-radius:8px;padding:8px 10px;color:#d4ddd9;font-size:15.9px;">
      <input data-debt-value="${a.id}" value="${esc(toNum(a.value,0))}" inputmode="numeric" style="width:142px;flex-shrink:0;background:#0a0d10;border:1px solid #181f26;border-radius:8px;padding:8px 10px;color:#ff5e7a;font-size:15.3px;text-align:right;">
      <button data-deldebt="${a.id}" style="background:none;border:none;color:#3a444c;cursor:pointer;font-size:18.9px;flex-shrink:0;">×</button>
    </div>`).join('') || `<div style="padding:18px 0;text-align:center;font-size:13.6px;color:#465058;">Inga skulder registrerade</div>`;

  return `
  ${card(`
    <div style="font-size:13px;letter-spacing:.16em;color:#5d6b76;margin-bottom:8px;">NETTOFÖRMÖGENHET</div>
    <div style="font-weight:700;font-size:42.5px;color:${D.netWorth>=0?'#00e5a0':'#ff5e7a'};margin-bottom:16px;">${fmt(D.netWorth)}</div>
    <div style="display:flex;height:12px;border-radius:8px;overflow:hidden;background:#10161b;margin-bottom:8px;">
      <div style="width:${D.totAssets/nwTotal*100}%;background:#00e5a0;"></div>
      <div style="width:${D.totDebts/nwTotal*100}%;background:#ff5e7a;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:13.6px;">
      <span style="color:#00e5a0;font-size:15.3px;">▸ Tillgångar ${fmt(D.totAssets)}</span>
      <span style="color:#ff5e7a;font-size:15.3px;">Skulder ${fmt(D.totDebts)} ◂</span>
    </div>
  `,'margin-bottom:14px;')}
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;">
    ${card(`
      <div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:14px;">TILLGÅNGAR</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <input id="a-name" value="${esc(ASSETFORM.name)}" placeholder="t.ex. Sparkonto, bostad..." style="flex:1;min-width:0;background:#0a0d10;border:1px solid #20272f;border-radius:10px;padding:10px;color:#dbe6ec;font-size:15.9px;">
        <input id="a-value" value="${esc(ASSETFORM.value)}" placeholder="kr" inputmode="numeric" style="width:142px;flex-shrink:0;background:#0a0d10;border:1px solid #20272f;border-radius:10px;padding:10px;color:#dbe6ec;font-size:15.3px;text-align:right;">
        <button id="btn-addasset" style="background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.4);color:#00e5a0;border-radius:10px;width:40px;flex-shrink:0;font-size:21.2px;cursor:pointer;">+</button>
      </div>
      <select id="a-category" style="width:100%;background:#0a0d10;border:1px solid #20272f;border-radius:10px;padding:9px 10px;color:#dbe6ec;font-size:13.6px;margin-bottom:14px;">${catOptsFor(ASSETFORM.category)}</select>
      ${assetRows}
    `)}
    ${card(`
      <div style="font-size:14.2px;letter-spacing:.1em;color:#cdd8d4;font-weight:600;margin-bottom:14px;">SKULDER</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <input id="d-name" value="${esc(DEBTFORM.name)}" placeholder="t.ex. bolån..." style="flex:1;min-width:0;background:#0a0d10;border:1px solid #20272f;border-radius:10px;padding:10px;color:#dbe6ec;font-size:15.9px;">
        <input id="d-value" value="${esc(DEBTFORM.value)}" placeholder="kr" inputmode="numeric" style="width:142px;flex-shrink:0;background:#0a0d10;border:1px solid #20272f;border-radius:10px;padding:10px;color:#dbe6ec;font-size:15.3px;text-align:right;">
        <button id="btn-adddebt" style="background:rgba(255,94,122,.12);border:1px solid rgba(255,94,122,.4);color:#ff5e7a;border-radius:10px;width:40px;flex-shrink:0;font-size:21.2px;cursor:pointer;">+</button>
      </div>
      ${debtRows}
    `)}
  </div>`;
}

function renderModal(){
  const exportText = esc(JSON.stringify(DATA, null, 2));
  const schemaText = esc('{\n  "transactions": [\n    { "type": "income|expense|investment",\n      "category": "Lön", "amount": 30000,\n      "date": "2026-06-25", "note": "" }\n  ],\n  "assets": [ { "name": "Sparkonto", "value": 90000 } ],\n  "debts":  [ { "name": "Bolån", "value": 1500000 } ],\n  "budgets": { "Mat": 5000, "Boende": 12000 },\n  "fire": { "currentAge": 30, "expectedReturn": 7, "inflation": 2, "swr": 4 }\n}');
  return `
  <div id="io-backdrop" style="position:fixed;inset:0;z-index:50;background:rgba(4,6,8,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:18px;">
    <div id="io-modal" style="width:min(640px,100%);max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,#11161b,#0b0e11);border:1px solid #222a32;border-radius:18px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.6);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="font-size:15.3px;letter-spacing:.1em;color:#eef4f1;font-weight:700;">DATA · IMPORT / EXPORT</div>
        <button id="btn-closeio" style="background:none;border:none;color:#5d6b76;font-size:26px;cursor:pointer;">×</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:18px;">
        <button id="btn-ioexport" style="flex:1;padding:11px;border-radius:10px;cursor:pointer;font-size:14.2px;font-weight:700;border:1px solid ${IO_MODE==='export'?'#00e5a0':'#20272f'};color:${IO_MODE==='export'?'#00e5a0':'#7c8893'};background:${IO_MODE==='export'?'rgba(0,229,160,.1)':'rgba(255,255,255,.012)'};">↑ EXPORTERA</button>
        <button id="btn-ioimport" style="flex:1;padding:11px;border-radius:10px;cursor:pointer;font-size:14.2px;font-weight:700;border:1px solid ${IO_MODE==='import'?'#2dd4ff':'#20272f'};color:${IO_MODE==='import'?'#2dd4ff':'#7c8893'};background:${IO_MODE==='import'?'rgba(45,212,255,.1)':'rgba(255,255,255,.012)'};">↓ IMPORTERA</button>
      </div>
      ${IO_MODE==='export' ? `
        <div style="font-size:11.8px;letter-spacing:.1em;color:#5d6b76;margin-bottom:8px;">DIN DATA (JSON) — klistra in i ditt Claude-Project</div>
        <textarea readonly style="width:100%;height:190px;background:#07090b;border:1px solid #20272f;border-radius:11px;padding:13px;color:#9fd8c6;font-size:13px;line-height:1.5;resize:vertical;">${exportText}</textarea>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
          <button id="btn-copyjson" style="flex:1;min-width:130px;background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.4);color:#00e5a0;border-radius:10px;padding:11px;font-size:14.2px;cursor:pointer;">⧉ Kopiera JSON</button>
          <button id="btn-downloadjson" style="flex:1;min-width:130px;background:rgba(255,255,255,.03);border:1px solid #222a32;color:#aeb9c2;border-radius:10px;padding:11px;font-size:14.2px;cursor:pointer;">⤓ Ladda ner .json</button>
        </div>
      ` : `
        <div style="font-size:11.8px;letter-spacing:.1em;color:#5d6b76;margin-bottom:8px;">KLISTRA IN JSON</div>
        <textarea id="import-text" placeholder="Klistra in JSON-data här..." style="width:100%;height:190px;background:#07090b;border:1px solid #20272f;border-radius:11px;padding:13px;color:#dbe6ec;font-size:13px;line-height:1.5;resize:vertical;">${esc(IMPORT_TEXT)}</textarea>
        <button id="btn-doimport" style="width:100%;margin-top:12px;background:linear-gradient(180deg,#2dd4ff,#1ba7d4);color:#04141a;border:none;border-radius:11px;padding:13px;font-weight:700;cursor:pointer;font-size:15.3px;">↓ IMPORTERA &amp; ERSÄTT</button>
        <details style="margin-top:14px;">
          <summary style="font-size:13px;color:#5d6b76;cursor:pointer;">Visa förväntat format</summary>
          <pre style="margin-top:10px;background:#07090b;border:1px solid #1a2128;border-radius:10px;padding:13px;color:#7d8a93;font-size:12.4px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;">${schemaText}</pre>
        </details>
      `}
      ${MSG ? `<div style="margin-top:14px;padding:11px 14px;border-radius:10px;font-size:13.6px;background:${MSG.ok?'rgba(0,229,160,.1)':'rgba(255,94,122,.1)'};border:1px solid ${MSG.ok?'rgba(0,229,160,.4)':'rgba(255,94,122,.4)'};color:${MSG.ok?'#00e5a0':'#ff5e7a'};">${esc(MSG.text)}</div>` : ''}
    </div>
  </div>`;
}

function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{
    TAB=b.dataset.tab;
    if (TAB==='transaktioner') { const t=new Date(); FORM.date = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); }
    render();
  });
  document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{
    const [y,m]=MONTH.split('-').map(Number);
    const d=new Date(y,m-1+Number(b.dataset.month),1);
    MONTH = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    render();
  });
  document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{ FORM.type=b.dataset.type; FORM.category=(DEFAULT_CATS[FORM.type]||['Övrigt'])[0]; render(); });
  document.querySelectorAll('[data-txf]').forEach(b=>b.onclick=()=>{ TXFILTER=b.dataset.txf; render(); });
  document.querySelectorAll('[data-deltx]').forEach(b=>b.onclick=async()=>{ DATA.transactions=DATA.transactions.filter(t=>t.id!==b.dataset.deltx); await saveData(); render(); });
  document.querySelectorAll('[data-delasset]').forEach(b=>b.onclick=async()=>{ DATA.assets=DATA.assets.filter(t=>t.id!==b.dataset.delasset); await saveData(); render(); });
  document.querySelectorAll('[data-deldebt]').forEach(b=>b.onclick=async()=>{ DATA.debts=DATA.debts.filter(t=>t.id!==b.dataset.deldebt); await saveData(); render(); });
  document.querySelectorAll('[data-budget]').forEach(inp=>inp.onchange=async(e)=>{
    const cat=inp.dataset.budget; const v=toNum(e.target.value,0);
    DATA.budgets = DATA.budgets||{};
    if(!v) delete DATA.budgets[cat]; else DATA.budgets[cat]=v;
    await saveData(); render();
  });

  const fa=document.getElementById('f-amount'); if(fa) fa.oninput=e=>FORM.amount=e.target.value;
  const fc=document.getElementById('f-category'); if(fc) fc.onchange=e=>FORM.category=e.target.value;
  const fd=document.getElementById('f-date'); if(fd) fd.oninput=e=>FORM.date=e.target.value;
  const fn=document.getElementById('f-note'); if(fn) fn.oninput=e=>FORM.note=e.target.value;
  const btnAdd=document.getElementById('btn-add'); if(btnAdd) btnAdd.onclick=async()=>{
    const amt=toNum(FORM.amount,0);
    if(!amt||amt<=0) return;
    DATA.transactions.unshift({ id:'tx'+Date.now(), type:FORM.type, category:FORM.category, amount:Math.abs(amt), date:FORM.date, note:(FORM.note||'').trim() });
    await saveData();
    FORM.amount=''; FORM.note='';
    render();
  };

  const an=document.getElementById('a-name'); if(an) an.oninput=e=>ASSETFORM.name=e.target.value;
  const av=document.getElementById('a-value'); if(av) av.oninput=e=>ASSETFORM.value=e.target.value;
  const ac=document.getElementById('a-category'); if(ac) ac.onchange=e=>ASSETFORM.category=e.target.value;
  const btnA=document.getElementById('btn-addasset'); if(btnA) btnA.onclick=async()=>{
    const v=toNum(ASSETFORM.value,0); if(!ASSETFORM.name.trim()||!v) return;
    DATA.assets.push({ id:'as'+Date.now(), name:ASSETFORM.name.trim(), value:v, category:ASSETFORM.category||ASSET_CATS[0] });
    await saveData(); ASSETFORM={name:'',value:'',category:ASSETFORM.category}; render();
  };
  document.querySelectorAll('[data-asset-name]').forEach(inp=>inp.onchange=async(e)=>{
    const it=DATA.assets.find(x=>x.id===inp.dataset.assetName); if(it){ it.name=e.target.value.trim()||it.name; await saveData(); render(); }
  });
  document.querySelectorAll('[data-asset-value]').forEach(inp=>inp.onchange=async(e)=>{
    const it=DATA.assets.find(x=>x.id===inp.dataset.assetValue); if(it){ it.value=toNum(e.target.value,it.value); await saveData(); render(); }
  });

  const dn=document.getElementById('d-name'); if(dn) dn.oninput=e=>DEBTFORM.name=e.target.value;
  const dv=document.getElementById('d-value'); if(dv) dv.oninput=e=>DEBTFORM.value=e.target.value;
  const btnD=document.getElementById('btn-adddebt'); if(btnD) btnD.onclick=async()=>{
    const v=toNum(DEBTFORM.value,0); if(!DEBTFORM.name.trim()||!v) return;
    DATA.debts.push({ id:'de'+Date.now(), name:DEBTFORM.name.trim(), value:v });
    await saveData(); DEBTFORM={name:'',value:''}; render();
  };
  document.querySelectorAll('[data-debt-name]').forEach(inp=>inp.onchange=async(e)=>{
    const it=DATA.debts.find(x=>x.id===inp.dataset.debtName); if(it){ it.name=e.target.value.trim()||it.name; await saveData(); render(); }
  });
  document.querySelectorAll('[data-debt-value]').forEach(inp=>inp.onchange=async(e)=>{
    const it=DATA.debts.find(x=>x.id===inp.dataset.debtValue); if(it){ it.value=toNum(e.target.value,it.value); await saveData(); render(); }
  });

  const btnOpenIO = document.getElementById('btn-openio'); if(btnOpenIO) btnOpenIO.onclick=()=>{ IO_OPEN=true; IO_MODE='export'; MSG=null; render(); };
  const backdrop = document.getElementById('io-backdrop'); if(backdrop) backdrop.onclick=(e)=>{ if(e.target.id==='io-backdrop'){ IO_OPEN=false; MSG=null; render(); } };
  const btnCloseIO = document.getElementById('btn-closeio'); if(btnCloseIO) btnCloseIO.onclick=()=>{ IO_OPEN=false; MSG=null; render(); };
  const btnIoExport = document.getElementById('btn-ioexport'); if(btnIoExport) btnIoExport.onclick=()=>{ IO_MODE='export'; MSG=null; render(); };
  const btnIoImport = document.getElementById('btn-ioimport'); if(btnIoImport) btnIoImport.onclick=()=>{ IO_MODE='import'; MSG=null; render(); };
  const btnCopy = document.getElementById('btn-copyjson'); if(btnCopy) btnCopy.onclick=()=>{
    try{ navigator.clipboard.writeText(JSON.stringify(DATA,null,2)); MSG={ok:true,text:'JSON kopierad ✓'}; }catch(e){ MSG={ok:false,text:'Kunde inte kopiera'}; } render();
  };
  const btnDownload = document.getElementById('btn-downloadjson'); if(btnDownload) btnDownload.onclick=()=>{
    try{
      const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='privatekonomi.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){}
  };
  const importTextEl = document.getElementById('import-text'); if(importTextEl) importTextEl.oninput=e=>IMPORT_TEXT=e.target.value;
  const btnDoImport = document.getElementById('btn-doimport'); if(btnDoImport) btnDoImport.onclick=async()=>{
    try{
      const parsed = JSON.parse(IMPORT_TEXT);
      DATA = {
        transactions: Array.isArray(parsed.transactions)?parsed.transactions:[],
        assets: Array.isArray(parsed.assets)?parsed.assets:[],
        debts: Array.isArray(parsed.debts)?parsed.debts:[],
        budgets: (parsed.budgets&&typeof parsed.budgets==='object')?parsed.budgets:{},
        fire: { ...emptyData().fire, ...(parsed.fire||{}) },
      };
      await saveData();
      IMPORT_TEXT=''; MSG={ok:true,text:'Data importerad ✓ ('+DATA.transactions.length+' poster)'};
    }catch(e){ MSG={ok:false,text:'Kunde inte tolka JSON: '+e.message}; }
    render();
  };
}

(async function init(){
  DATA = await loadData();
  if (TAB==='transaktioner') { const t=new Date(); FORM.date = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); }
  render();
})();
</script>

</html>
