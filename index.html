<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Privatekonomi Terminal</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#07090b;font-family:'Courier New',monospace;}
#global-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(rgba(7,9,11,.72),rgba(7,9,11,.72)),url('https://pontusdaahl.github.io/Privatekonomi/bg-desktop.jpg') center/cover no-repeat;}
@media(max-width:700px){#global-bg{background:linear-gradient(rgba(7,9,11,.72),rgba(7,9,11,.72)),url('https://pontusdaahl.github.io/Privatekonomi/bg-mobile.jpg') center/cover no-repeat;}}
#root{position:relative;z-index:1;}
#bottom-nav{z-index:100;}
body{color:#e6edf3;}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#1b242d;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
input,select,button,textarea{font-family:inherit}
input::placeholder,textarea::placeholder{color:#465058}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2dd4ff !important;box-shadow:0 0 0 3px rgba(45,212,255,.13)}
select option{background:#0b0f13;color:#e6edf3}
input[type="date"]{color-scheme:dark;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;opacity:0;position:absolute;right:0;width:36px;height:100%;}
@keyframes nwpulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
#pin-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(rgba(7,9,11,.88),rgba(7,9,11,.88)),url('https://pontusdaahl.github.io/Privatekonomi/bg-desktop.jpg') center/cover no-repeat;}
@media(max-width:700px){#pin-screen{background:linear-gradient(rgba(7,9,11,.88),rgba(7,9,11,.88)),url('https://pontusdaahl.github.io/Privatekonomi/bg-mobile.jpg') center/cover no-repeat;}}
#pin-box{background:rgba(11,14,17,.7);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px 36px;text-align:center;width:min(340px,90vw);}
#pin-dots{display:flex;justify-content:center;gap:16px;margin:28px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);transition:all .2s;}
.pin-dot.filled{background:#00e5a0;border-color:#00e5a0;box-shadow:0 0 12px rgba(0,229,160,.6);}
#pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:240px;margin:0 auto;}
.pin-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;
  padding:18px;font-size:22px;font-weight:600;color:#e6edf3;cursor:pointer;font-family:'Courier New',monospace;
  transition:all .15s;}
.pin-btn:active{background:rgba(0,229,160,.2);border-color:#00e5a0;transform:scale(.94);}
#pin-error{color:#ff5e7a;font-size:13px;height:18px;margin-top:12px;}

/* FIRE sliders - in head so they always apply */
input[type=range].fire-sl{
  -webkit-appearance:none;appearance:none;
  width:100%;height:8px;border-radius:8px;
  background:#1a2128;outline:none;
  cursor:grab;border:none;display:block;
}
input[type=range].fire-sl:active{cursor:grabbing;}
input[type=range].fire-sl::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:28px;height:28px;border-radius:50%;
  background:#00e5a0;cursor:grab;
  border:3px solid #07090b;
  box-shadow:0 0 14px rgba(0,229,160,.7);
  margin-top:-10px;
}
input[type=range].fire-sl::-webkit-slider-runnable-track{
  height:8px;border-radius:8px;background:#1a2128;
}
input[type=range].fire-sl::-moz-range-thumb{
  width:28px;height:28px;border-radius:50%;
  background:#00e5a0;cursor:grab;
  border:3px solid #07090b;
  box-shadow:0 0 14px rgba(0,229,160,.7);
}
input[type=range].fire-sl::-moz-range-track{height:8px;border-radius:8px;background:#1a2128;}
input[type=range].fire-sl::-moz-range-progress{height:8px;border-radius:8px;background:#00e5a0;}

/* Desktop big numbers on MAL page */
@media(min-width:701px){
  #mal-fire-num{font-size:42px !important;}
  #mal-nw-num{font-size:42px !important;}
  #mal-pct{font-size:38px !important;}
  #mal-w3m,#mal-w4m{font-size:32px !important;}
}

/* Bottom nav */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(11,14,17,.97);backdrop-filter:blur(12px);
  border-top:1px solid #1a2128;
  padding:6px 0 env(safe-area-inset-bottom,6px);}
#bottom-nav button{flex:1;background:none;border:none;color:#5d6b76;cursor:pointer;
  padding:10px 2px;font-family:'Courier New',monospace;font-size:10px;
  letter-spacing:.06em;display:flex;flex-direction:column;align-items:center;gap:5px;
  min-height:60px;}
#bottom-nav button.bnav-active{color:#00e5a0;}
#bottom-nav button svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2;}

@media(max-width:700px){
  #bottom-nav{display:flex;}
  body{padding-bottom:0;}
  #main-wrap{padding:14px !important;padding-bottom:72px !important;}
  #main-wrap nav{display:none !important;}
  #main-wrap header{display:none !important;}
  /* MAL mobile overrides - !important beats inline styles */
  #mal-fire-num{font-size:22px !important;}
  #mal-nw-num{font-size:22px !important;}
  #mal-pct{font-size:24px !important;}
  #mal-bar-wrap{height:14px !important;}
  #mal-w3m,#mal-w4m{font-size:20px !important;}
  #mal-page{padding:14px !important;padding-bottom:80px !important;margin:-14px !important;}
}
</style>
</head>
<body>
<div id="global-bg"></div>
<div id="pin-screen">
  <div id="pin-box">
    <div style="font-size:11px;letter-spacing:.2em;color:#5d6b76;margin-bottom:6px;">PRIVATEKONOMI</div>
    <div style="font-size:20px;font-weight:700;color:#eef4f1;">Ange PIN-kod</div>
    <div id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div id="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn" onclick="pinClear()" style="font-size:16px;color:#8b97a3;">⌫</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn" style="opacity:0;pointer-events:none;"></button>
    </div>
    <div id="pin-error"></div>
  </div>
</div>
<div id="root" style="display:none;">Laddar...</div>
<div id="bottom-nav">
  <button id="bnav-oversikt" onclick="setTab('oversikt')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    ÖVERSIKT
  </button>
  <button id="bnav-transaktioner" onclick="setTab('transaktioner')">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    TRANSAKTION
  </button>
  <button id="bnav-formogenhet" onclick="setTab('formogenhet')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
    FÖRMÖGENHET
  </button>
  <button id="bnav-mal" onclick="setTab('mal')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
    FIRE
  </button>
</div>
<script>
const PIN_HASH = '3a7bd3e2360a3d29eea436fcfb7e44c735d117c681f5656f8ac';
// Simple hash check - not cryptographic but sufficient for casual protection
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(36);}
const CORRECT = simpleHash('3294');
let pinEntry='';
function pinPress(d){
  if(pinEntry.length>=4)return;
  pinEntry+=d;
  updatePinDots();
  if(pinEntry.length===4){
    if(simpleHash(pinEntry)===CORRECT){
      try{sessionStorage.setItem('pk-unlocked','1');}catch(e){}
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('root').style.display='';
    } else {
      document.getElementById('pin-error').textContent='Fel PIN-kod';
      document.getElementById('pin-box').style.animation='pinShake .4s ease';
      setTimeout(()=>{
        pinEntry='';
        updatePinDots();
        document.getElementById('pin-error').textContent='';
        document.getElementById('pin-box').style.animation='';
      },600);
    }
  }
}
function pinClear(){if(pinEntry.length>0){pinEntry=pinEntry.slice(0,-1);updatePinDots();}}
function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d)d.classList.toggle('filled',i<pinEntry.length);
  }
}
// Skip PIN if already unlocked this session
if(sessionStorage.getItem('pk-unlocked')==='1'){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('root').style.display='';
}

function emptyData(){
  return {transactions:[],assets:[],debts:[],budgets:{},
    fire:{currentAge:'27',expectedReturn:'7',inflation:'2',swr:'4',monthlySaving:null,currentCapital:null,targetAnnualSpend:null}};
}
let DATA=null, TAB='oversikt', TXFILTER='all', IO_OPEN=false, IO_MODE='export', IMPORT_TEXT='', MSG=null, SAVE_TIMER=null, FIRE_CHART=null;
let MONTH=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
let FORM={type:'expense',amount:'',category:'Bostad',date:MONTH+'-01',note:''};
let ASSETFORM={name:'',value:'',category:'Aktier/fonder'};
let DEBTFORM={name:'',value:''};
const FIRE_DEFAULTS={monthlySpend:29000,expectedReturn:7,monthlySaving:15000,
  bgUrl:'https://pontusdaahl.github.io/Privatekonomi/bg-desktop.jpg',
  bgMobUrl:'https://pontusdaahl.github.io/Privatekonomi/bg-mobile.jpg'};
let FIRE=Object.assign({},FIRE_DEFAULTS);
async function saveFire(){
  // lightweight save on slider move — full save via SPARA button
  const D=derive(MONTH);
  const d={
    currentAge: calcAge(),
    expectedReturn: Number(FIRE.expectedReturn)||7,
    inflation: 2,
    swr: 4,
    monthlySaving: Number(FIRE.monthlySaving)||0,
    targetAnnualSpend: Number(FIRE.monthlySpend)*12||0,
    currentCapital: Number(D.netWorth)||0
  };
  try{
    await fetch(FIREBASE_URL+'/privatekonomi/fire.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(d)
    });
  }catch(e){console.warn('saveFire failed',e);}
}
async function doSaveFire(){
  const btn=document.getElementById('btn-save-fire');
  const status=document.getElementById('fire-save-status');
  if(btn)btn.textContent='Sparar...';
  if(status){status.textContent='';status.style.color='';}
  const D=derive(MONTH);
  const d={
    currentAge: calcAge(),
    expectedReturn: Number(FIRE.expectedReturn) || 7,
    inflation: 2,
    swr: 4,
    monthlySaving: Number(FIRE.monthlySaving) || 0,
    targetAnnualSpend: Number(FIRE.monthlySpend) * 12 || 0,
    currentCapital: Number(D.netWorth) || 0
  };
  try{
    const r=await fetch(FIREBASE_URL+'/privatekonomi/fire.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(d)
    });
    if(r.ok){
      if(status){status.textContent='✓ Sparat!';status.style.color='#00e5a0';}
      setTimeout(()=>{if(status)status.textContent='';},3000);
    } else {
      if(status){status.textContent='✗ Firebase: '+r.status;status.style.color='#ff5e7a';}
    }
  }catch(e){
    if(status){status.textContent='✗ '+e.message;status.style.color='#ff5e7a';}
  }
  if(btn)btn.textContent='SPARA';
}
async function loadFire(){
  try{
    const r=await fetch(FIREBASE_URL+'/privatekonomi/fire.json');
    if(r.ok){
      const d=await r.json();
      if(d && typeof d.expectedReturn==='number'){
        FIRE.expectedReturn=d.expectedReturn;
        if(typeof d.monthlySaving==='number') FIRE.monthlySaving=d.monthlySaving;
        if(typeof d.targetAnnualSpend==='number') FIRE.monthlySpend=Math.round(d.targetAnnualSpend/12);
        return;
      }
    }
  }catch(e){console.warn('loadFire failed',e);}
}

const DEFAULT_CATS={expense:['Bostad','Mat','Transport','Nöje','Kläder','Övrigt'],income:['Lön','Övrigt'],investment:['Övrigt','Aktier','Fonder','Amortering']};
const ASSET_CATS=['Aktier/fonder','Sparande','Fastigheter','Fordon','Extra'];
const FIREBASE_URL='https://privatekonomi-6ca77-default-rtdb.europe-west1.firebasedatabase.app';
const DB_PATH='/privatekonomi.json';

async function loadData(){
  try{const r=await fetch(FIREBASE_URL+DB_PATH);if(r.ok){const d=await r.json();if(d)return d;}}catch(e){}
  try{const raw=localStorage.getItem('pk-v1');if(raw)return JSON.parse(raw);}catch(e){}
  return emptyData();
}
async function saveData(){
  try{localStorage.setItem('pk-v1',JSON.stringify(DATA));}catch(e){}
  clearTimeout(SAVE_TIMER);
  SAVE_TIMER=setTimeout(async()=>{
    try{await fetch(FIREBASE_URL+DB_PATH,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(DATA)});}catch(e){}
  },800);
}

const fmt=v=>new Intl.NumberFormat('sv-SE',{maximumFractionDigits:0}).format(Math.round(v||0))+' kr';
const toNum=(x,d=0)=>{const n=Number(String(x==null?'':x).replace(/\s/g,'').replace(',','.'));return isFinite(n)?n:d;};
function monthLabel(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m-1,1).toLocaleDateString('sv-SE',{month:'long',year:'numeric'});}
function calcAge(){const b=new Date('1998-08-04'),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function todayStr(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}

function setTab(tab, pushState=true){
  TAB=tab;
  if(tab==='transaktioner') FORM.date=todayStr();
  if(pushState) history.pushState({tab}, '', '#'+tab);
  render();
}
window.addEventListener('popstate', e=>{
  const tab = (e.state&&e.state.tab) || 'oversikt';
  setTab(tab, false);
});
function updateBottomNav(){
  document.querySelectorAll('#bottom-nav button').forEach(b=>{
    b.classList.toggle('bnav-active', b.id==='bnav-'+TAB);
  });
}

function derive(month){
  const monthTx=DATA.transactions.filter(t=>t.date&&t.date.slice(0,7)===month);
  const S=(arr,p)=>arr.filter(p).reduce((a,t)=>a+(Number(t.amount)||0),0);
  const income=S(monthTx,t=>t.type==='income'),expense=S(monthTx,t=>t.type==='expense'),invested=S(monthTx,t=>t.type==='investment');
  const saved=income-expense,savingsRate=income>0?(saved/income*100):0;
  const totAssets=DATA.assets.reduce((a,x)=>a+toNum(x.value,0),0);
  const totDebts=DATA.debts.reduce((a,x)=>a+toNum(x.value,0),0);
  const netWorth=totAssets-totDebts;
  const expByCat={};monthTx.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+(Number(t.amount)||0);});
  const year=(month||'').slice(0,4);
  const yearTx=DATA.transactions.filter(t=>t.date&&t.date.slice(0,4)===year);
  const yExpByCat={};yearTx.filter(t=>t.type==='expense').forEach(t=>{yExpByCat[t.category]=(yExpByCat[t.category]||0)+(Number(t.amount)||0);});
  const allExpByCat={};DATA.transactions.filter(t=>t.type==='expense').forEach(t=>{allExpByCat[t.category]=(allExpByCat[t.category]||0)+(Number(t.amount)||0);});
  const yIncome=S(yearTx,t=>t.type==='income'),yExpense=S(yearTx,t=>t.type==='expense'),yInvested=S(yearTx,t=>t.type==='investment');
  const ySaved=yIncome-yExpense,yRate=yIncome>0?(ySaved/yIncome*100):0;
  const allIncome=S(DATA.transactions,t=>t.type==='income'),allExpense=S(DATA.transactions,t=>t.type==='expense'),allInvested=S(DATA.transactions,t=>t.type==='investment');
  const allSaved=allIncome-allExpense,allRate=allIncome>0?(allSaved/allIncome*100):0;
  const allDates=DATA.transactions.map(t=>t.date).filter(Boolean).sort();
  const firstDate=allDates.length?allDates[0]:null;
  return{income,expense,invested,saved,savingsRate,totAssets,totDebts,netWorth,expByCat,
    year,yIncome,yExpense,yInvested,ySaved,yRate,yExpByCat,
    allIncome,allExpense,allInvested,allSaved,allRate,allExpByCat,firstDate,monthTxCount:monthTx.length};
}

function render(){
  const D=derive(MONTH);
  document.getElementById('root').innerHTML=`
  <div style="min-height:100vh;color:#e6edf3;background:transparent;">
  <div id="main-wrap" style="max-width:1400px;margin:0 auto;padding:28px;">
    <header style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,229,160,.2),rgba(45,212,255,.12));border:1px solid rgba(0,229,160,.38);box-shadow:0 0 24px rgba(0,229,160,.28);font-size:20px;color:#00e5a0;">◆</div>
        <div>
          <div style="font-weight:700;letter-spacing:.14em;font-size:17.7px;color:#eef4f1;">PRIVATEKONOMI</div>
          <div style="display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.2em;color:#5d6b76;margin-top:2px;">
            <span style="width:7px;height:7px;border-radius:50%;background:#00e5a0;box-shadow:0 0 9px #00e5a0;animation:nwpulse 2.2s infinite;display:inline-block;"></span>TERMINAL · LIVE
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
        <div style="text-align:right;">
          <div style="font-size:11px;letter-spacing:.18em;color:#5d6b76;">NETTOFÖRMÖGENHET</div>
          <div style="margin-top:3px;font-weight:700;font-size:26px;color:${D.netWorth>=0?'#00e5a0':'#ff5e7a'}">${fmt(D.netWorth)}</div>
        </div>
        <button id="btn-openio" style="background:rgba(255,255,255,.025);color:#aeb9c2;border:1px solid #222a32;border-radius:11px;padding:10px 15px;font-size:14px;cursor:pointer;">⇅ DATA</button>
      </div>
    </header>
    <nav style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
      ${['oversikt','transaktioner','formogenhet','mal'].map(k=>{
        const labels={oversikt:'ÖVERSIKT',transaktioner:'TRANSAKTIONER',formogenhet:'FÖRMÖGENHET',mal:'FIRE'};
        const a=TAB===k;
        return `<button onclick="setTab('${k}')" style="padding:10px 17px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:600;letter-spacing:.05em;border:1px solid ${a?'rgba(0,229,160,.5)':'#1b2228'};background:${a?'linear-gradient(180deg,rgba(0,229,160,.15),rgba(0,229,160,.04))':'rgba(255,255,255,.012)'};color:${a?'#00e5a0':'#7c8893'};">${labels[k]}</button>`;
      }).join('')}
    </nav>
    <div id="content"></div>
  </div></div>
  ${IO_OPEN?renderModal():''}`;
  document.getElementById('content').innerHTML=
    TAB==='oversikt'?renderOversikt(D):
    TAB==='transaktioner'?renderTx(D):
    TAB==='mal'?renderMal(D):
    renderFormogenhet(D);
  bindEvents();
  if(TAB==='mal') bindFireEvents();
  updateBottomNav();
}

function card(content,style=''){return`<div style="background:rgba(11,14,17,.42);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;${style}">${content}</div>`;}
function row(l,v,col){return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #141a20;"><span style="font-size:16px;color:#8b97a3;">${l}</span><span style="font-size:15px;color:${col};">${v}</span></div>`;}
function catBreakdown(e){
  const total=Object.values(e).reduce((a,v)=>a+v,0)||1,entries=Object.entries(e).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return`<div style="padding:10px 0;text-align:center;font-size:13px;color:#465058;">Inga utgifter</div>`;
  const cols=['#00e5a0','#2dd4ff','#ffb454','#ff5e7a','#a78bfa'];

function renderMal(D){
  const nw=D.netWorth;
  const target=(FIRE.monthlySpend*12)/0.04;
  const pct=Math.min(100,nw/target*100);
  const ret=FIRE.expectedReturn/100,sav=FIRE.monthlySaving;
  function yrsTo(t){if(nw>=t)return 0;let w=nw,y=0;while(w<t&&y<100){w=w*(1+ret)+sav*12;y++;}return y<100?y:null;}
  const yFire=yrsTo(target);
  const w3=nw*0.03,w4=nw*0.04;
  const pctCol=pct>=100?'#00e5a0':pct>=50?'#ffb454':'#2dd4ff';
  return `
  <div id="mal-page" style="margin:-28px;padding:40px;position:relative;min-height:100vh;background:transparent;">

function drawFireChart(D){
  const c=document.getElementById('fire-chart');if(!c)return;
  const nw=D.netWorth,ret=FIRE.expectedReturn/100,sav=FIRE.monthlySaving;
  const target=(FIRE.monthlySpend*12)/0.04;
  const age=calcAge();
  const labels=[],v1=[],v2=[];let w=nw;
  for(let y=0;y<=20;y++){
    labels.push((age+y)+' år');
    v1.push(Math.round(w));v2.push(Math.round(target));
    w=w*(1+ret)+sav*12;
  }
  if(FIRE_CHART){FIRE_CHART.destroy();FIRE_CHART=null;}
  FIRE_CHART=new Chart(c,{type:'line',data:{labels,datasets:[
    {label:'Förmögenhet',data:v1,borderColor:'#00e5a0',backgroundColor:'rgba(0,229,160,0.07)',borderWidth:2.5,pointRadius:3,fill:true,tension:.3},
    {label:'FIRE-mål',data:v2,borderColor:'#2dd4ff',borderWidth:2,borderDash:[5,4],pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:true,labels:{color:'rgba(255,255,255,.5)',font:{size:13},boxWidth:14,padding:16}},
      tooltip:{callbacks:{
        title:ctx=>ctx[0].label,
        label:ctx=>ctx[0].dataset.label+': '+new Intl.NumberFormat('sv-SE',{maximumFractionDigits:0}).format(ctx[0].raw)+' kr'
      }}
    },
    scales:{
      x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.45)',font:{size:13},maxTicksLimit:7}},
      y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.45)',font:{size:13},callback:v=>v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?Math.round(v/1000)+'k':v}}
    }}});
}

function bindFireEvents(){
  const fmtKr=v=>new Intl.NumberFormat('sv-SE',{maximumFractionDigits:0}).format(Math.round(v))+' kr';
  function updateInPlace(){
    const nw=derive(MONTH).netWorth;
    const target=(FIRE.monthlySpend*12)/0.04;
    const pct=Math.min(100,nw/target*100);
    const pctCol=pct>=100?'#00e5a0':pct>=50?'#ffb454':'#2dd4ff';
    const ret=FIRE.expectedReturn/100,sav=FIRE.monthlySaving;
    function yrsTo(t){if(nw>=t)return 0;let w=nw,y=0;while(w<t&&y<100){w=w*(1+ret)+sav*12;y++;}return y<100?y:null;}
    const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
    set('mal-fire-num',fmtKr(target));
    set('mal-fire-sub',fmtKr(FIRE.monthlySpend)+'/mån · 4%-regeln');
    set('mal-pct',pct.toFixed(1)+'%');
    set('mal-achieved',fmtKr(nw)+' uppnått');
    set('mal-remaining',fmtKr(Math.max(0,target-nw))+' kvar');
    set('mal-time',yrsTo(target)!==null?`Uppskattad tid till FIRE: ca ${yrsTo(target)} år (${FIRE.expectedReturn}% avkastning, ${fmtKr(sav)}/mån)`:'Justera sparande för att nå målet');
    set('mal-w3m',fmtKr(nw*0.03/12));set('mal-w3y',fmtKr(nw*0.03)+'/år');
    set('mal-w4m',fmtKr(nw*0.04/12));set('mal-w4y',fmtKr(nw*0.04)+'/år');
    const bar=document.getElementById('mal-bar');if(bar){bar.style.width=pct+'%';}
    const pctEl=document.getElementById('mal-pct');if(pctEl)pctEl.style.color=pctCol;
    drawFireChart(derive(MONTH));
  }
  ['fire-spend','fire-sav','fire-ret'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.oninput=e=>{
      const keyMap={'fire-spend':'monthlySpend','fire-sav':'monthlySaving','fire-ret':'expectedReturn'};const key=keyMap[id];
      FIRE[key]=parseFloat(e.target.value);
      const outId={'fire-spend':'out-spend','fire-sav':'out-sav','fire-ret':'out-ret'}[id];
      const out=document.getElementById(outId);
      if(out)out.textContent=id==='fire-ret'?FIRE[key].toFixed(1)+'%':fmtKr(FIRE[key]);
      saveFire(); // async, non-blocking
      updateInPlace();
    };
  });
  drawFireChart(derive(MONTH));
}

function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{
    TAB=b.dataset.tab;
    if (TAB==='transaktioner') { const t=new Date(); FORM.date = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); }
    render();
  });
  document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{
    const [y,m]=MONTH.split('-').map(Number);
    const d=new Date(y,m-1+Number(b.dataset.month),1);
    MONTH = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    render();
  });
  document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{ FORM.type=b.dataset.type; FORM.category=(DEFAULT_CATS[FORM.type]||['Övrigt'])[0]; render(); });
  document.querySelectorAll('[data-txf]').forEach(b=>b.onclick=()=>{ TXFILTER=b.dataset.txf; render(); });
  document.querySelectorAll('[data-deltx]').forEach(b=>b.onclick=async()=>{ DATA.transactions=DATA.transactions.filter(t=>t.id!==b.dataset.deltx); await saveData(); render(); });
  document.querySelectorAll('[data-delasset]').forEach(b=>b.onclick=async()=>{ DATA.assets=DATA.assets.filter(t=>t.id!==b.dataset.delasset); await saveData(); render(); });
  document.querySelectorAll('[data-deldebt]').forEach(b=>b.onclick=async()=>{ DATA.debts=DATA.debts.filter(t=>t.id!==b.dataset.deldebt); await saveData(); render(); });
  document.querySelectorAll('[data-budget]').forEach(inp=>inp.onchange=async(e)=>{
    const cat=inp.dataset.budget; const v=toNum(e.target.value,0);
    DATA.budgets = DATA.budgets||{};
    if(!v) delete DATA.budgets[cat]; else DATA.budgets[cat]=v;
    await saveData(); render();
  });

  const fa=document.getElementById('f-amount'); if(fa) fa.oninput=e=>FORM.amount=e.target.value;
  const fc=document.getElementById('f-category'); if(fc) fc.onchange=e=>FORM.category=e.target.value;
  const fd=document.getElementById('f-date'); if(fd) fd.oninput=e=>FORM.date=e.target.value;
  const fn=document.getElementById('f-note'); if(fn) fn.oninput=e=>FORM.note=e.target.value;
  const btnAdd=document.getElementById('btn-add'); if(btnAdd) btnAdd.onclick=async()=>{
    const amt=toNum(FORM.amount,0);
    if(!amt||amt<=0) return;
    DATA.transactions.unshift({ id:'tx'+Date.now(), type:FORM.type, category:FORM.category, amount:Math.abs(amt), date:FORM.date, note:(FORM.note||'').trim() });

    FORM.amount=''; FORM.note='';
    render();

  const an=document.getElementById('a-name'); if(an) an.oninput=e=>ASSETFORM.name=e.target.value;
  const av=document.getElementById('a-value'); if(av) av.oninput=e=>ASSETFORM.value=e.target.value;
  const ac=document.getElementById('a-category'); if(ac) ac.onchange=e=>ASSETFORM.category=e.target.value;
  const btnA=document.getElementById('btn-addasset'); if(btnA) btnA.onclick=async()=>{
    const v=toNum(ASSETFORM.value,0); if(!ASSETFORM.name.trim()||!v) return;

      const a=document.createElement('a'); a.href=url; a.download='privatekonomi.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){}
  };
  const importTextEl = document.getElementById('import-text'); if(importTextEl) importTextEl.oninput=e=>IMPORT_TEXT=e.target.value;
  const btnDoImport = document.getElementById('btn-doimport'); if(btnDoImport) btnDoImport.onclick=async()=>{
    try{
      const parsed = JSON.parse(IMPORT_TEXT);
      DATA = {
        transactions: Array.isArray(parsed.transactions)?parsed.transactions:[],
        assets: Array.isArray(parsed.assets)?parsed.assets:[],
        debts: Array.isArray(parsed.debts)?parsed.debts:[],
        budgets: (parsed.budgets&&typeof parsed.budgets==='object')?parsed.budgets:{},
        fire: { ...emptyData().fire, ...(parsed.fire||{}) },
      };
      await saveData();
      IMPORT_TEXT=''; MSG={ok:true,text:'Data importerad ✓ ('+DATA.transactions.length+' poster)'};
    }catch(e){ MSG={ok:false,text:'Kunde inte tolka JSON: '+e.message}; }
    render();
  };
}

(async function init(){
  DATA = await loadData();
  await loadFire();
  FORM.date=todayStr();
  const hash=location.hash.replace('#','');
  if(['oversikt','transaktioner','formogenhet','mal'].includes(hash)) TAB=hash;
  history.replaceState({tab:TAB},'','#'+TAB);
  render();
})();
</script>
